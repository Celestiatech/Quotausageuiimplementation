<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CareerPilot Copilot Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="page-head">
        <img class="brand-logo" src="../icons/icon48.png" alt="CareerPilot" />
        <div>
          <h1>CareerPilot LinkedIn Copilot</h1>
          <p class="sub">Configure runtime behavior for the extension.</p>
        </div>
      </header>

      <form id="settings-form" class="card">
        <h2>Safety</h2>
        <div class="row checks">
          <label class="check">
            <input id="liveModeAcknowledged" type="checkbox" />
            <span>I acknowledge live auto-submit risk</span>
          </label>
        </div>

        <h2>Run Limits</h2>

        <div class="row">
          <label>
            <span>Max Applications Per Run</span>
            <input id="maxApplicationsPerRun" type="number" min="1" max="200" />
          </label>
          <label>
            <span>Max Skips Per Run</span>
            <input id="maxSkipsPerRun" type="number" min="1" max="500" />
          </label>
        </div>

        <label>
          <span>Switch Search Term After N Successful Applies</span>
          <input id="switchNumber" type="number" min="1" max="300" />
        </label>

        <div class="row checks">
          <label class="check">
            <input id="easyApplyOnly" type="checkbox" />
            <span>Enable Easy Apply filter</span>
          </label>
          <label class="check">
            <input id="debugMode" type="checkbox" />
            <span>Debug Mode (verbose logs)</span>
          </label>
          <label class="check">
            <input id="dryRun" type="checkbox" />
            <span>Dry Run (do not submit)</span>
          </label>
          <label class="check">
            <input id="autoSubmit" type="checkbox" />
            <span>Auto Submit</span>
          </label>
          <label class="check">
            <input id="autoResumeOnAnswer" type="checkbox" />
            <span>Auto Resume After Answer</span>
          </label>
          <label class="check">
            <input id="runNonStop" type="checkbox" />
            <span>Run non-stop cycles</span>
          </label>
          <label class="check">
            <input id="alternateSortBy" type="checkbox" />
            <span>Alternate sort each cycle</span>
          </label>
          <label class="check">
            <input id="cycleDatePosted" type="checkbox" />
            <span>Cycle date-posted each cycle</span>
          </label>
          <label class="check">
            <input id="stopDateCycleAt24hr" type="checkbox" />
            <span>Stop date cycle at Past 24 hours</span>
          </label>
          <label class="check">
            <input id="followCompanies" type="checkbox" />
            <span>Follow company on submit</span>
          </label>
          <label class="check">
            <input id="pauseBeforeSubmit" type="checkbox" />
            <span>Pause before submit</span>
          </label>
          <label class="check">
            <input id="pauseAtFailedQuestion" type="checkbox" />
            <span>Pause at failed question</span>
          </label>
          <label class="check">
            <input id="overwritePreviousAnswers" type="checkbox" />
            <span>Overwrite existing answers</span>
          </label>
        </div>

        <h2>Search</h2>

        <label>
          <span>Search Terms (comma/newline separated)</span>
          <textarea id="searchTerms" rows="3" placeholder="Software Engineer, Python Developer"></textarea>
        </label>

        <label class="check">
          <input id="randomizeSearchOrder" type="checkbox" />
          <span>Randomize search term order on each run</span>
        </label>

        <div class="row">
          <label>
            <span>Sort By</span>
            <select id="sortBy">
              <option value="">No change</option>
              <option value="Most recent">Most recent</option>
              <option value="Most relevant">Most relevant</option>
            </select>
          </label>
          <label>
            <span>Date Posted</span>
            <select id="datePosted">
              <option value="">No change</option>
              <option value="Past 24 hours">Past 24 hours</option>
              <option value="Past week">Past week</option>
              <option value="Past month">Past month</option>
              <option value="Any time">Any time</option>
            </select>
          </label>
          <label>
            <span>Salary Filter</span>
            <input id="salary" type="text" placeholder="$100,000+" />
          </label>
        </div>

        <h2>Advanced Search Filters</h2>

        <label>
          <span>Experience Level (comma/newline separated)</span>
          <textarea id="experienceLevel" rows="2" placeholder="Entry level, Associate"></textarea>
        </label>

        <label>
          <span>Job Type (comma/newline separated)</span>
          <textarea id="jobType" rows="2" placeholder="Full-time, Contract"></textarea>
        </label>

        <label>
          <span>On-site Mode (comma/newline separated)</span>
          <textarea id="onSite" rows="2" placeholder="Remote, Hybrid"></textarea>
        </label>

        <label>
          <span>Companies (comma/newline separated)</span>
          <textarea id="companies" rows="2" placeholder="Google, Amazon"></textarea>
        </label>

        <label>
          <span>Locations Filter (comma/newline separated)</span>
          <textarea id="filterLocations" rows="2" placeholder="United States, New York"></textarea>
        </label>

        <label>
          <span>Industry (comma/newline separated)</span>
          <textarea id="industry" rows="2" placeholder="Software Development"></textarea>
        </label>

        <label>
          <span>Job Function (comma/newline separated)</span>
          <textarea id="jobFunction" rows="2" placeholder="Engineering"></textarea>
        </label>

        <label>
          <span>Job Titles Filter (comma/newline separated)</span>
          <textarea id="jobTitles" rows="2" placeholder="Software Engineer"></textarea>
        </label>

        <label>
          <span>Benefits (comma/newline separated)</span>
          <textarea id="benefits" rows="2" placeholder="Health insurance"></textarea>
        </label>

        <label>
          <span>Commitments (comma/newline separated)</span>
          <textarea id="commitments" rows="2" placeholder="Diversity and inclusion"></textarea>
        </label>

        <div class="row checks">
          <label class="check">
            <input id="under10Applicants" type="checkbox" />
            <span>Under 10 applicants</span>
          </label>
          <label class="check">
            <input id="inYourNetwork" type="checkbox" />
            <span>In your network</span>
          </label>
          <label class="check">
            <input id="fairChanceEmployer" type="checkbox" />
            <span>Fair chance employer</span>
          </label>
        </div>

        <label>
          <span>Search Location (LinkedIn city/location box)</span>
          <input id="searchLocation" type="text" placeholder="United States" />
        </label>

        <div class="row checks two-col">
          <label class="check">
            <input id="didMasters" type="checkbox" />
            <span>Has Masters degree</span>
          </label>
          <label class="check">
            <input id="securityClearance" type="checkbox" />
            <span>Has active security clearance</span>
          </label>
        </div>

        <label>
          <span>Current Experience (years, -1 disables cap)</span>
          <input id="currentExperience" type="number" min="-1" max="50" />
        </label>

        <label>
          <span>Blacklisted Companies (comma separated)</span>
          <input id="blacklistedCompanies" type="text" placeholder="Company A, Company B" />
        </label>

        <label>
          <span>About Company Bad Words (comma separated)</span>
          <input id="aboutCompanyBadWords" type="text" placeholder="staffing, recruiting" />
        </label>

        <label>
          <span>About Company Good Words (skip bad-word block if matched)</span>
          <input id="aboutCompanyGoodWords" type="text" placeholder="Robert Half, Dice" />
        </label>

        <label>
          <span>Bad Words In Job Title/Description (comma separated)</span>
          <input id="badWords" type="text" placeholder="staffing, recruiter, internship" />
        </label>

        <h2>Contact and Common Answers</h2>

        <label>
          <span>Current City (for location questions)</span>
          <input id="currentCity" type="text" placeholder="San Francisco" />
        </label>

        <label>
          <span>Contact Email</span>
          <input id="contactEmail" type="email" placeholder="you@example.com" />
        </label>

        <div class="row">
          <label>
            <span>Phone Number</span>
            <input id="phoneNumber" type="text" placeholder="9876543210" />
          </label>
          <label>
            <span>Phone Country Code</span>
            <input id="phoneCountryCode" type="text" placeholder="+1" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>Marketing Consent</span>
            <select id="marketingConsent">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </label>
          <label>
            <span>Require Visa</span>
            <select id="requireVisa">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>
            <span>US Citizenship Status</span>
            <input id="usCitizenship" type="text" placeholder="U.S. Citizen/Permanent Resident" />
          </label>
          <label>
            <span>Veteran Status</span>
            <input id="veteranStatus" type="text" placeholder="No" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>Disability Status</span>
            <input id="disabilityStatus" type="text" placeholder="No" />
          </label>
          <label>
            <span>Years Of Experience Answer</span>
            <input id="yearsOfExperienceAnswer" type="text" placeholder="5" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>Gender</span>
            <select id="gender">
              <option value="">No preference</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
              <option value="Decline">Decline</option>
            </select>
          </label>
          <label>
            <span>Ethnicity</span>
            <select id="ethnicity">
              <option value="">No preference</option>
              <option value="Decline">Decline</option>
              <option value="Hispanic/Latino">Hispanic/Latino</option>
              <option value="American Indian or Alaska Native">American Indian or Alaska Native</option>
              <option value="Asian">Asian</option>
              <option value="Black or African American">Black or African American</option>
              <option value="Native Hawaiian or Other Pacific Islander">Native Hawaiian or Other Pacific Islander</option>
              <option value="White">White</option>
              <option value="Other">Other</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>
            <span>Desired Salary</span>
            <input id="desiredSalary" type="text" placeholder="120000" />
          </label>
          <label>
            <span>Current CTC / Salary</span>
            <input id="currentCtc" type="text" placeholder="85000" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>Notice Period (days)</span>
            <input id="noticePeriodDays" type="text" placeholder="15" />
          </label>
          <label>
            <span>Confidence Level (1-10)</span>
            <input id="confidenceLevel" type="text" placeholder="8" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>LinkedIn URL</span>
            <input id="linkedinUrl" type="url" placeholder="https://www.linkedin.com/in/you" />
          </label>
          <label>
            <span>Website/Portfolio</span>
            <input id="websiteUrl" type="url" placeholder="https://example.com" />
          </label>
        </div>

        <label>
          <span>Recent Employer</span>
          <input id="recentEmployer" type="text" placeholder="Acme Corp" />
        </label>

        <div class="row">
          <label>
            <span>First Name</span>
            <input id="firstName" type="text" placeholder="Jane" />
          </label>
          <label>
            <span>Middle Name</span>
            <input id="middleName" type="text" placeholder="A" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>Last Name</span>
            <input id="lastName" type="text" placeholder="Doe" />
          </label>
          <label>
            <span>Full Name (optional override)</span>
            <input id="fullName" type="text" placeholder="Jane A Doe" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>Street Address</span>
            <input id="streetAddress" type="text" placeholder="123 Main St" />
          </label>
          <label>
            <span>State/Province</span>
            <input id="stateRegion" type="text" placeholder="California" />
          </label>
        </div>

        <div class="row">
          <label>
            <span>Postal Code</span>
            <input id="postalCode" type="text" placeholder="94105" />
          </label>
          <label>
            <span>Country</span>
            <input id="country" type="text" placeholder="United States" />
          </label>
        </div>

        <label>
          <span>LinkedIn Headline</span>
          <input id="linkedinHeadline" type="text" placeholder="Full Stack Developer" />
        </label>

        <label>
          <span>LinkedIn Summary</span>
          <textarea id="linkedinSummary" rows="3" placeholder="Short profile summary..."></textarea>
        </label>

        <label>
          <span>Cover Letter Template</span>
          <textarea id="coverLetter" rows="4" placeholder="Cover letter text..."></textarea>
        </label>

        <div class="actions">
          <button type="submit">Save Settings</button>
          <span id="status"></span>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
